name: Unity CI for iOS and Android

on: [push, pull_request, workflow_dispatch]
  # push:
  #   branches: [ "main" ]
  # pull_request:
  # workflow_dispatch:

jobs:
  build-for-android:
    runs-on: ubuntu-latest
    steps:
      - name: Checkout repository
        uses: actions/checkout@v3

      - uses: actions/cache@v3
        with:
          path: Library
          key: Library-${{ matrix.targetPlatform }}
          restore-keys: Library-

      - name: Build Unity Project for Android
        uses: game-ci/unity-builder@v4
        env:
          UNITY_EMAIL: ${{ secrets.UNITY_EMAIL }}
          UNITY_PASSWORD: ${{ secrets.UNITY_PASSWORD }}
          UNITY_SERIAL: ${{ secrets.UNITY_SERIAL }}
        with:
          unityVersion: '6000.0.35f1'
          targetPlatform: Android
          # Optional: customParameters: -quit -batchmode

  build-ios:
    runs-on: macos-latest
    steps:
      - uses: actions/checkout@v3
        with:
          fetch-depth: 0

      - uses: actions/cache@v3
        with:
          path: Library
          key: Library-iOS
          restore-keys: Library-

      - name: Activate license
        uses: game-ci/unity-builder@v4
        env:
          UNITY_EMAIL: ${{ secrets.UNITY_EMAIL }}
          UNITY_PASSWORD: ${{ secrets.UNITY_PASSWORD }}
          UNITY_SERIAL: ${{ secrets.UNITY_SERIAL }}
        with:
          customParameters: -batchmode -nographics -silent-crashes -quit -logfile "-" -projectPath . -username $UNITY_EMAIL -password $UNITY_PASSWORD -serial $UNITY_SERIAL

      - name: Build for iOS
        uses: game-ci/unity-builder@v4
        env:
          UNITY_EMAIL: ${{ secrets.UNITY_EMAIL }}
          UNITY_PASSWORD: ${{ secrets.UNITY_PASSWORD }}
          UNITY_SERIAL: ${{ secrets.UNITY_SERIAL }}
        with:
          targetPlatform: iOS

      - name: Return license
        uses: game-ci/unity-builder@v4
        env:
          UNITY_EMAIL: ${{ secrets.UNITY_EMAIL }}
          UNITY_PASSWORD: ${{ secrets.UNITY_PASSWORD }}
          UNITY_SERIAL: ${{ secrets.UNITY_SERIAL }}
        with:
          customParameters: -batchmode -quit -returnlicense


  # This job runs after both builds finish and exports the .unitypackage
  export-and-commit-unitypackage:
    name: Export and Commit .unitypackage
    runs-on: ubuntu-latest
    needs: [build-for-android, build-for-ios]
    steps:
      - name: Check out repository
        uses: actions/checkout@v3
      
      - name: Export RadarUnitySDK.unitypackage
        uses: game-ci/unity-builder@v4
        env:
          UNITY_EMAIL: ${{ secrets.UNITY_EMAIL }}
          UNITY_PASSWORD: ${{ secrets.UNITY_PASSWORD }}
          UNITY_SERIAL: ${{ secrets.UNITY_SERIAL }}
        with:
          unityVersion: '6000.0.35f1'
          # The platform doesn't matter much for an export-package step, so pick one:
          targetPlatform: StandaloneWindows
          # Custom CLI parameters to export Assets folder to a .unitypackage
          # Adjust the Assets path if you only want a subfolder.
          customParameters: -quit -batchmode -nographics -projectPath . -exportPackage Assets RadarUnitySDK.unitypackage

      - name: Commit and push .unitypackage
        run: |
          # Switch to main branch to avoid merge conflicts
          git checkout main
          git pull origin main

          # Stage and commit
          git config user.name "github-actions"
          git config user.email "github-actions@github.com"
          git add RadarUnitySDK.unitypackage

          # The [skip ci] tag helps avoid infinite re-triggering
          git commit -m "Add RadarUnitySDK.unitypackage [skip ci]"

          # Push changes
          git push origin HEAD:main
        env:
          GITHUB_TOKEN: ${{ secrets.GITHUB_TOKEN }}
