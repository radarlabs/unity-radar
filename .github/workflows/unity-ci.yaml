name: Build project

on: [push, pull_request]

jobs:
  buildForAllSupportedPlatforms:
    name: Build for ${{ matrix.targetPlatform }}
    runs-on: ${{ matrix.os }}
    strategy:
      fail-fast: false
      matrix:
        os: [ubuntu-latest]
        targetPlatform:
          - iOS # Build an iOS player (requires macOS).
          # - Android # Build an Android .apk standalone app.
    steps:
      - uses: actions/checkout@v4
        with:
          fetch-depth: 0
          lfs: true

      - uses: actions/cache@v3
        with:
          path: Library
          key: Library-${{ matrix.targetPlatform }}
          restore-keys: Library-

      # Free disk space if Android
      - if: matrix.targetPlatform == 'Android'
        uses: jlumbroso/free-disk-space@v1.3.1

      # Unity Builder Step
      - uses: game-ci/unity-builder@v4
        env:
          UNITY_EMAIL: ${{ secrets.UNITY_EMAIL }}
          UNITY_PASSWORD: ${{ secrets.UNITY_PASSWORD }}
          UNITY_SERIAL: ${{ secrets.UNITY_SERIAL }}
        with:
          targetPlatform: ${{ matrix.targetPlatform }}
          unityVersion: 6000.0.35f1

      # Upload the build as an artifact
      - uses: actions/upload-artifact@v3
        with:
          name: Build-${{ matrix.targetPlatform }}
          path: build/${{ matrix.targetPlatform }}

  export-unitypackage:
    name: Export .unitypackage
    runs-on: ubuntu-latest
    needs: [buildForAllSupportedPlatforms]

    steps:
      - name: Checkout Repository
        uses: actions/checkout@v4
        with:
          fetch-depth: 0

      # Figure out which branch we should push to
      - name: Determine branch name
        id: vars
        run: echo "BRANCH_NAME=${GITHUB_HEAD_REF:-${GITHUB_REF#refs/heads/}}" >> $GITHUB_OUTPUT

      # Remove the old package so we can be sure a new version is recognized as changed
      - name: Remove old .unitypackage
        run: |
          rm -f RadarUnitySDK.unitypackage
          git config user.name "github-actions"
          git config user.email "github-actions@github.com"
          git add -A
          if git diff --cached --quiet; then
            echo "No changes from removing old unitypackage."
          else
            git commit -m "Remove old unitypackage [skip ci]"
          fi

      # Build & export the Unity package
      - name: Export RadarUnitySDK.unitypackage
        uses: game-ci/unity-builder@v4
        env:
          UNITY_EMAIL: ${{ secrets.UNITY_EMAIL }}
          UNITY_PASSWORD: ${{ secrets.UNITY_PASSWORD }}
          UNITY_SERIAL: ${{ secrets.UNITY_SERIAL }}
        with:
          targetPlatform: StandaloneWindows
          unityVersion: 6000.0.35f1
          versioning: None
          allowDirtyBuild: true
          customParameters: -nographics -exportPackage Assets /home/runner/work/unity-radar/RadarUnitySDK.unitypackage

      # Upload the .unitypackage artifact (optional)
      - name: Upload Unity Package
        uses: actions/upload-artifact@v3
        with:
          name: RadarUnitySDK.unitypackage
          path: RadarUnitySDK.unitypackage

      # Commit and push .unitypackage to the current branch
      - name: Commit and Push .unitypackage
        run: |
          # Verify if the file exists
          ls -l /home/runner/work/unity-radar/RadarUnitySDK.unitypackage || exit 1

          # Move it to the expected location
          mv /home/runner/work/unity-radar/RadarUnitySDK.unitypackage RadarUnitySDK.unitypackage

          git config user.name "github-actions"
          git config user.email "github-actions@github.com"
          
          git add RadarUnitySDK.unitypackage
          
          if git diff --cached --quiet; then
            echo "No changes to commit."
            exit 0
          fi

          git commit -m "Add exported Unity package [skip ci]"
          git push origin ${{ steps.vars.outputs.BRANCH_NAME }}

        env:
          GITHUB_TOKEN: ${{ secrets.GITHUB_TOKEN }}
    