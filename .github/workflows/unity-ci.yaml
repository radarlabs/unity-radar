name: Unity CI for iOS and Android

on: [push, pull_request, workflow_dispatch]

jobs:
  build-for-android:
    runs-on: ubuntu-latest
    steps:
      # 1) Checkout
      - name: Checkout repository
        uses: actions/checkout@v3

      # 2) Build for Android (Docker is fine on Linux)
      - name: Build Unity Project for Android
        uses: game-ci/unity-builder@v4
        env:
          UNITY_EMAIL: ${{ secrets.UNITY_EMAIL }}
          UNITY_PASSWORD: ${{ secrets.UNITY_PASSWORD }}
          UNITY_SERIAL: ${{ secrets.UNITY_SERIAL }}
        with:
          unityVersion: "2021.3.25f1"         # Example of a real Unity version
          targetPlatform: Android
          # customParameters: -quit -batchmode

  build-for-ios:
    runs-on: macos-latest
    steps:
      # 1) Checkout
      - name: Checkout repository
        uses: actions/checkout@v3

      # 2) Explicit Unity License Activation (no Docker)
      - name: Activate Unity License
        uses: game-ci/unity-activate@v4
        env:
          UNITY_EMAIL: ${{ secrets.UNITY_EMAIL }}
          UNITY_PASSWORD: ${{ secrets.UNITY_PASSWORD }}
          UNITY_SERIAL: ${{ secrets.UNITY_SERIAL }}
        with:
          unityVersion: "2021.3.25f1" # Must match the version you'll build with

      # 3) Build for iOS (remote = true) - skip license activation here
      - name: Build Unity Project for iOS
        uses: game-ci/unity-builder@v4
        with:
          unityVersion: "2021.3.25f1"
          targetPlatform: iOS
          remote: true               # <--- Enables building directly on the host
          activateLicense: false     # <--- We've already activated the license
