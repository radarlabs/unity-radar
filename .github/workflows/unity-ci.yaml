name: Unity CI for iOS and Android

on: [push, pull_request, workflow_dispatch]

jobs:
  build-for-ios:
    runs-on: macos-latest
    steps:
      # Checkout the repository
      - name: Checkout repository
        uses: actions/checkout@v3

      # Set up Unity
      - name: Setup Unity
        uses: actions/setup-dotnet@v3
        with:
          dotnet-version: 6.x

      # Activate Unity License
      - name: Activate Unity License
        uses: game-ci/unity-activate@v1
        with:
          unityVersion: '6000.0.24f1'
        env:
          UNITY_EMAIL: ${{ secrets.UNITY_EMAIL }}
          UNITY_PASSWORD: ${{ secrets.UNITY_PASSWORD }}
          UNITY_SERIAL: ${{ secrets.UNITY_SERIAL }}

      # Build Unity Project for iOS
      - name: Build Unity Project for iOS
        uses: game-ci/unity-builder@v2
        with:
          unityVersion: '6000.0.24f1'
          targetPlatform: iOS

      # Return Unity License
      - name: Return Unity License
        uses: game-ci/unity-return-license@v1

  build-for-android:
    runs-on: ubuntu-latest
    steps:
      # Checkout the repository
      - name: Checkout repository
        uses: actions/checkout@v3

      # Set up Unity
      - name: Setup Unity
        uses: actions/setup-dotnet@v3
        with:
          dotnet-version: 6.x

      # Activate Unity License
      - name: Activate Unity License
        uses: game-ci/unity-activate@v1
        with:
          unityVersion: '6000.0.24f1'
        env:
          UNITY_EMAIL: ${{ secrets.UNITY_EMAIL }}
          UNITY_PASSWORD: ${{ secrets.UNITY_PASSWORD }}
          UNITY_SERIAL: ${{ secrets.UNITY_SERIAL }}

      # Build Unity Project for Android
      - name: Build Unity Project for Android
        uses: game-ci/unity-builder@v2
        with:
          unityVersion: '6000.0.24f1'
          targetPlatform: Android

      # Return Unity License
      - name: Return Unity License
        uses: game-ci/unity-return-license@v1
