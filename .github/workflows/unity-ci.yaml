name: Build project

on: [push, pull_request]

jobs:
  buildForAllSupportedPlatforms:
    name: Build for ${{ matrix.targetPlatform }}
    runs-on: ${{ matrix.os }}
    strategy:
      fail-fast: false
      matrix:
        os: [ubuntu-latest]
        targetPlatform:
          - iOS # Build an iOS player (requires macOS).
          - Android # Build an Android .apk standalone app.
    steps:
      - uses: actions/checkout@v4
        with:
          fetch-depth: 0
          lfs: true

      - uses: actions/cache@v3
        with:
          path: Library
          key: Library-${{ matrix.targetPlatform }}
          restore-keys: Library-

      # Free disk space if Android
      - if: matrix.targetPlatform == 'Android'
        uses: jlumbroso/free-disk-space@v1.3.1

      # Unity Builder Step
      - uses: game-ci/unity-builder@v4
        env:
          UNITY_EMAIL: ${{ secrets.UNITY_EMAIL }}
          UNITY_PASSWORD: ${{ secrets.UNITY_PASSWORD }}
          UNITY_SERIAL: ${{ secrets.UNITY_SERIAL }}
        with:
          targetPlatform: ${{ matrix.targetPlatform }}
          unityVersion: 6000.0.35f1

      # Upload the build as an artifact
      - uses: actions/upload-artifact@v3
        with:
          name: Build-${{ matrix.targetPlatform }}
          path: build/${{ matrix.targetPlatform }}

  buildUnityPackage:
    name: Build and Upload .unitypackage
    needs: buildForAllSupportedPlatforms # Runs only if both iOS and Android builds succeed
    runs-on: ubuntu-latest

    steps:
      - uses: actions/checkout@v4
        with:
          fetch-depth: 0
          lfs: true

      - name: Install Unity Package Exporter
        run: |
          mkdir -p Assets/Editor
          curl -sL https://raw.githubusercontent.com/OneMinuteUnity/unity-package-exporter/main/Editor/ExportPackage.cs -o Assets/Editor/ExportPackage.cs

      - name: Export Unity Package
        uses: game-ci/unity-builder@v4
        env:
          UNITY_EMAIL: ${{ secrets.UNITY_EMAIL }}
          UNITY_PASSWORD: ${{ secrets.UNITY_PASSWORD }}
          UNITY_SERIAL: ${{ secrets.UNITY_SERIAL }}
        with:
          targetPlatform: StandaloneWindows # Doesn't matter, we just need Unity to run
          unityVersion: 6000.0.35f1
          versioning: None
          allowDirtyBuild: true
          customParameters: -executeMethod ExportPackage.Run -projectPath . -logFile export.log

      - name: Move .unitypackage to root
        run: mv ExportedPackage.unitypackage RadarUnitySDK.unitypackage

      - name: Push to branch
        run: |
          git config --global user.name 'github-actions'
          git config --global user.email 'github-actions@github.com'
          git add RadarUnitySDK.unitypackage
          git commit -m "Update RadarUnitySDK.unitypackage"
          git push