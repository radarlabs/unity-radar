name: Build project

on: [push, pull_request]

jobs:
  buildForAllSupportedPlatforms:
    name: Build for ${{ matrix.targetPlatform }}
    runs-on: ${{ matrix.os }}
    strategy:
      fail-fast: false
      matrix:
        os: [ubuntu-latest]
        targetPlatform:
          - iOS # Build an iOS player (requires macOS).
          - Android # Build an Android .apk standalone app.
    steps:
      - uses: actions/checkout@v4
        with:
          fetch-depth: 0
          lfs: true

      - uses: actions/cache@v3
        with:
          path: Library
          key: Library-${{ matrix.targetPlatform }}
          restore-keys: Library-

      # Free disk space if Android
      - if: matrix.targetPlatform == 'Android'
        uses: jlumbroso/free-disk-space@v1.3.1

      # Unity Builder Step
      - uses: game-ci/unity-builder@v4
        env:
          UNITY_EMAIL: ${{ secrets.UNITY_EMAIL }}
          UNITY_PASSWORD: ${{ secrets.UNITY_PASSWORD }}
          UNITY_SERIAL: ${{ secrets.UNITY_SERIAL }}
        with:
          targetPlatform: ${{ matrix.targetPlatform }}
          unityVersion: 6000.0.35f1

      # Upload the build as an artifact
      - uses: actions/upload-artifact@v3
        with:
          name: Build-${{ matrix.targetPlatform }}
          path: build/${{ matrix.targetPlatform }}

  export-unitypackage:
    name: Export .unitypackage
    runs-on: ubuntu-latest
    needs: [buildForAllSupportedPlatforms] # Waits for all platform builds to finish

    steps:
      - name: Checkout Repository
        uses: actions/checkout@v4

      # Build and export Unity package
      - name: Export RadarUnitySDK.unitypackage
        uses: game-ci/unity-builder@v4
        env:
          UNITY_EMAIL: ${{ secrets.UNITY_EMAIL }}
          UNITY_PASSWORD: ${{ secrets.UNITY_PASSWORD }}
          UNITY_SERIAL: ${{ secrets.UNITY_SERIAL }}
        with:
          targetPlatform: StandaloneWindows
          unityVersion: 6000.0.35f1
          customParameters: -nographics -exportPackage Assets RadarUnitySDK.unitypackage

      # Upload the .unitypackage file as an artifact
      - name: Upload Unity Package
        uses: actions/upload-artifact@v3
        with:
          name: RadarUnitySDK.unitypackage
          path: RadarUnitySDK.unitypackage

      # Commit and push .unitypackage to the main branch
      - name: Commit and Push .unitypackage
        run: |
          git config --global user.name "github-actions"
          git config --global user.email "github-actions@github.com"

          # Reset and pull the latest main branch to avoid conflicts
          git reset --hard
          git checkout main
          git pull origin main

          # Ensure we are in the correct directory
          ls -l RadarUnitySDK.unitypackage

          # Forcefully replace the old .unitypackage file with the new one
          cp -f RadarUnitySDK.unitypackage ./RadarUnitySDK.unitypackage

          # Add ONLY the .unitypackage file, ignoring other changes
          git add RadarUnitySDK.unitypackage

          # Check if there are actual changes to commit
          if git diff --cached --quiet; then
            echo "No changes to commit. Exiting successfully."
            exit 0
          fi

          # Commit and push the updated .unitypackage file
          git commit -m "Update RadarUnitySDK.unitypackage [skip ci]"
          git push origin main
        env:
          GITHUB_TOKEN: ${{ secrets.GITHUB_TOKEN }}

    
