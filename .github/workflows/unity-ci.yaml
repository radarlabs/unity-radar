name: Unity CI

on: [push, pull_request]

jobs:
  build-and-test:
    runs-on: ubuntu-latest

    steps:
      - name: Checkout repository
        uses: actions/checkout@v2  # Make sure to use the correct version if updated

      - name: Cache Library Folder
        uses: actions/cache@v2
        with:
          path: Library
          key: Library-${{ hashFiles('**/ProjectSettings/ProjectVersion.txt') }}
          restore-keys: |
            Library-

      - name: Setup Unity
        uses: game-ci/unity-builder@v2  # Use the correct action for setting up Unity, this includes setup tasks
        with:
          unity-version: '2020.3.2f1'  # Replace with your actual Unity version, correct the format if it was previously wrong

      - name: Activate Unity
        uses: game-ci/unity-request-activation-file@v2
        with:
          unity-version: '2020.3.2f1'

      - name: Activate license
        uses: game-ci/unity-activate@v2
        with:
          license: ${{ secrets.UNITY_SECRET }}

      - name: Run Tests
        uses: game-ci/unity-test-runner@v2
        with:
          testMode: playmode

      - name: Build Project
        uses: game-ci/unity-builder@v2
        with:
          targetPlatform: StandaloneWindows64

      - name: Upload Test Results
        uses: actions/upload-artifact@v2
        with:
          name: Test Results
          path: results/
