name: Build project

on: [push, pull_request]

jobs:
  buildForAllSupportedPlatforms:
    name: Build for ${{ matrix.targetPlatform }}
    runs-on: ${{ matrix.os }}
    strategy:
      fail-fast: false
      matrix:
        os: [ubuntu-latest]
        targetPlatform:
          - iOS # Build an iOS player (requires macOS).
          # - Android # Build an Android .apk standalone app.
    steps:
      - uses: actions/checkout@v4
        with:
          fetch-depth: 0
          lfs: true

      - uses: actions/cache@v3
        with:
          path: Library
          key: Library-${{ matrix.targetPlatform }}
          restore-keys: Library-

      # Free disk space if Android
      - if: matrix.targetPlatform == 'Android'
        uses: jlumbroso/free-disk-space@v1.3.1

      # Unity Builder Step
      - uses: game-ci/unity-builder@v4
        env:
          UNITY_EMAIL: ${{ secrets.UNITY_EMAIL }}
          UNITY_PASSWORD: ${{ secrets.UNITY_PASSWORD }}
          UNITY_SERIAL: ${{ secrets.UNITY_SERIAL }}
        with:
          targetPlatform: ${{ matrix.targetPlatform }}
          unityVersion: 6000.0.35f1

      # Upload the build as an artifact
      - uses: actions/upload-artifact@v3
        with:
          name: Build-${{ matrix.targetPlatform }}
          path: build/${{ matrix.targetPlatform }}

  export-unitypackage:
    name: Export .unitypackage
    runs-on: ubuntu-latest
    needs: [buildForAllSupportedPlatforms] # Waits for all platform builds to finish

    steps:
      - name: Checkout Repository
        uses: actions/checkout@v4



      - name: Remove TMP Examples & Extras
        run: |
          rm -rf "Assets/TextMesh Pro/Examples & Extras"
          rm -rf "Assets/TextMesh Pro/Shaders"


      # Reset any unwanted local changes before running Unity
      - name: Clean Working Directory
        run: |
          git reset --hard HEAD
          git clean -fd
          git status  # Debug: Show the clean working directory state

      # Step 1️⃣: Build the project (NO executeMethod here!)
      - name: Build Project
        uses: game-ci/unity-builder@v4
        env:
          UNITY_EMAIL: ${{ secrets.UNITY_EMAIL }}
          UNITY_PASSWORD: ${{ secrets.UNITY_PASSWORD }}
          UNITY_SERIAL: ${{ secrets.UNITY_SERIAL }}
        with:
          targetPlatform: StandaloneWindows  # Adjust if needed
          unityVersion: 2021.3.20f1
          allowDirtyBuild: true 
          # customParameters: -restorePackages

      # Step 2️⃣: Run Unity separately to export the .unitypackage
      - name: Export Unity Package
        uses: game-ci/unity-builder@v4  # Re-use the builder action to access Unity
        env:
          UNITY_EMAIL: ${{ secrets.UNITY_EMAIL }}
          UNITY_PASSWORD: ${{ secrets.UNITY_PASSWORD }}
          UNITY_SERIAL: ${{ secrets.UNITY_SERIAL }}
        with:
          targetPlatform: NoTarget  # Prevents unnecessary builds
          unityVersion: 2021.3.20f1
          allowDirtyBuild: true 
          customParameters: -batchmode -nographics -quit -executeMethod ExportPackage.Run -logFile unity_export.log

      # Step 3️⃣: Upload the .unitypackage file as an artifact
      - name: Upload Unity Package
        uses: actions/upload-artifact@v3
        with:
          name: RadarUnitySDK.unitypackage
          path: RadarUnitySDK.unitypackage

      # Step 4️⃣: Commit and push .unitypackage to the main branch
      - name: Commit and Push .unitypackage
        run: |
          git config --global user.name "github-actions"
          git config --global user.email "github-actions@github.com"

          git reset --hard HEAD
          git clean -fd  # Removes untracked files and directories

          git fetch origin main
          git checkout main
          git pull origin main

          git rm -f RadarUnitySDK.unitypackage || true
          mv RadarUnitySDK.unitypackage RadarUnitySDK.unitypackage
          git add -f RadarUnitySDK.unitypackage

          if git diff --cached --quiet; then
            echo "No changes to commit. Exiting successfully."
            exit 0
          fi

          git commit -m "Updated Unity package [skip ci]"
          git push origin main
        env:
          GITHUB_TOKEN: ${{ secrets.GITHUB_TOKEN }}
