name: Unity CI

on: [push, pull_request, workflow_dispatch]

jobs:
  build-and-test:
    runs-on: ubuntu-latest

    steps:
      # Checkout the repository
      - name: Checkout repository
        uses: actions/checkout@v3

      # Set up Unity with correct version
      - name: Setup Unity
        uses: actions/setup-dotnet@v3
        with:
          dotnet-version: 6.x # Required for Unity activation

      # Activate Unity License
      - name: Activate Unity License
        uses: game-ci/unity-activate@v1
        with:
          unityVersion: '2022.3.4f1' # Replace with your correct Unity version
        env:
          UNITY_EMAIL: ${{ secrets.UNITY_EMAIL }}
          UNITY_PASSWORD: ${{ secrets.UNITY_PASSWORD }}
          UNITY_SERIAL: ${{ secrets.UNITY_SERIAL }}

      # Build the Unity Project
      - name: Build Unity Project
        uses: game-ci/unity-builder@v2
        with:
          unityVersion: '2022.3.4f1' # Match your Unity version here
          targetPlatform: StandaloneWindows64 # Replace with your target platform

      # Return the Unity License
      - name: Return Unity License
        uses: game-ci/unity-return-license@v1
