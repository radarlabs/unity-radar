name: Unity CI

on:
  push:
    branches:
      - main
  pull_request:
    branches:
      - main
  release:
    types: [published]

jobs:
  build:
    runs-on: ubuntu-latest
    steps:
      - name: Checkout repository
        uses: actions/checkout@v3

      - name: Set up Unity
        uses: game-ci/unity-setup@v2
        with:
          unityVersion: "2021.3.41f1"

      - name: Build project
        uses: game-ci/unity-builder@v2
        with:
          projectPath: .
          unityVersion: "2021.3.41f1"

      - name: Run tests
        uses: game-ci/unity-test-runner@v2
        with:
          projectPath: .
          unityVersion: "2021.3.41f1"

  publish:
    needs: build
    runs-on: ubuntu-latest
    if: github.event_name == 'release'
    steps:
      - name: Checkout repository
        uses: actions/checkout@v3

      - name: Set up Unity
        uses: game-ci/unity-setup@v2
        with:
          unityVersion: "2021.3.41f1"

      - name: Build project
        uses: game-ci/unity-builder@v2
        with:
          projectPath: .
          unityVersion: "2021.3.41f1"

      - name: Create Unity package
        run: |
          mkdir -p output
          cp -r Assets/YourPackageName output/

      - name: Publish Unity package to GitHub Releases
        uses: softprops/action-gh-release@v1
        with:
          files: output/*
        env:
          GITHUB_TOKEN: ${{ secrets.GITHUB_TOKEN }}
