name: Release Unity Package

on:
  release:
    types: [created]  # Runs when a new release is created

jobs:
  export-unitypackage:
    name: Export and Attach .unitypackage
    runs-on: ubuntu-latest

    steps:
      - name: Checkout Repository
        uses: actions/checkout@v4

      # Reset unwanted changes before running Unity
      - name: Clean Working Directory
        run: |
          git reset --hard HEAD
          git clean -fd
          git status  # Debug: Show the clean working directory state

      # Step 1️⃣: Run Unity to Export the .unitypackage
      - name: Export Unity Package
        uses: game-ci/unity-builder@v4
        env:
          UNITY_EMAIL: ${{ secrets.UNITY_EMAIL }}
          UNITY_PASSWORD: ${{ secrets.UNITY_PASSWORD }}
          UNITY_SERIAL: ${{ secrets.UNITY_SERIAL }}
        with:
          targetPlatform: NoTarget  # Prevents unnecessary builds
          unityVersion: 2021.3.20f1  # Match your Unity version
          allowDirtyBuild: true
          customParameters: -batchmode -nographics -quit -executeMethod ExportPackage.Run -logFile unity_export.log

      # Step 2️⃣: Verify the exported package exists
      - name: Verify Exported Package
        run: |
          if [ ! -f "RadarUnitySDK.unitypackage" ]; then
            echo "Error: RadarUnitySDK.unitypackage was not created!"
            exit 1
          fi

      # Step 3️⃣: Upload .unitypackage to the GitHub Release
      - name: Upload Unity Package to Release
        uses: softprops/action-gh-release@v1
        with:
          files: RadarUnitySDK.unitypackage
        env:
          GITHUB_TOKEN: ${{ secrets.GITHUB_TOKEN }}
