name: Build and Attach .unitypackage

on:
  release:
    # types: [created, published, prereleased]
    types: [created]
  workflow_dispatch:

jobs:
  build-unity-package:
    name: Export & Attach Unity Package
    runs-on: ubuntu-latest
    steps:

      # 1. Check out the repository
      - name: Checkout
        uses: actions/checkout@v4
        with:
          fetch-depth: 0
          lfs: true

      # 2. Activate Unity License
      - name: Activate Unity License
        uses: game-ci/unity-activate@v1
        env:
          UNITY_EMAIL: ${{ secrets.UNITY_EMAIL }}
          UNITY_PASSWORD: ${{ secrets.UNITY_PASSWORD }}
          UNITY_SERIAL: ${{ secrets.UNITY_SERIAL }}

      # 3. Cache the Library folder (optional)
      - uses: actions/cache@v3
        with:
          path: Library
          key: Library-standalone
          restore-keys: Library-

      # 4. Run Unity to export the .unitypackage
      - name: Export Unity Package
        uses: game-ci/unity-builder@v4
        env:
          UNITY_EMAIL: ${{ secrets.UNITY_EMAIL }}
          UNITY_PASSWORD: ${{ secrets.UNITY_PASSWORD }}
          UNITY_SERIAL: ${{ secrets.UNITY_SERIAL }}
        with:
          targetPlatform: StandaloneLinux64
          unityVersion: 6000.0.35f1
          dockerImage: unityci/editor-ubuntu-6000.0.35f1-base-3.1.0
          customParameters: >
            -nographics -logFile unity_export.log
            -exportPackage "Assets/ExternalDependencyManager" "Assets/Plugins" "Assets/Radar" "Assets/Settings" "Packages/com.unity.textmeshpro" "RadarUnitySDK.unitypackage"

      # 5. Upload the .unitypackage to the GitHub Release
      - name: Upload release asset
        uses: actions/upload-release-asset@v1
        with:
          upload_url: ${{ github.event.release.upload_url }}
          asset_path: "RadarUnitySDK.unitypackage"
          asset_name: "RadarUnitySDK.unitypackage"
          asset_content_type: application/octet-stream
