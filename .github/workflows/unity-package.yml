name: Build and Attach .unitypackage

on:
  release:
    types: [created, published, prereleased]
  workflow_dispatch:

jobs:
  build-unity-package:
    name: Export & Attach Unity Package
    runs-on: ubuntu-latest
    steps:

      # 1. Check out the repository
      - name: Checkout
        uses: actions/checkout@v4
        with:
          fetch-depth: 0
          lfs: true

      # 2. Cache the Library folder (optional, can help speed up Unity builds)
      - uses: actions/cache@v3
        with:
          path: Library
          key: Library-standalone
          restore-keys: Library-

      # 3. Run the Unity builder to call our ExportPackage script.
      #    Use a "dummy" target platform or any platform you want. The key part
      #    is the custom parameter to call your method: ExportPackage.Run
      - name: Build .unitypackage
        uses: game-ci/unity-builder@v4
        env:
          UNITY_EMAIL: ${{ secrets.UNITY_EMAIL }}
          UNITY_PASSWORD: ${{ secrets.UNITY_PASSWORD }}
          UNITY_SERIAL: ${{ secrets.UNITY_SERIAL }}
        with:
          targetPlatform: StandaloneLinux64
          unityVersion: 6000.0.35f1
          customParameters: -executeMethod ExportPackage.Run

      # 4. Upload the .unitypackage to the *GitHub Release* that triggered this workflow
      - name: Upload release asset
        uses: actions/upload-release-asset@v1
        with:
          upload_url: ${{ github.event.release.upload_url }}
          asset_path: "RadarUnitySDK.unitypackage"   # The .unitypackage file name from ExportPackage.cs
          asset_name: "RadarUnitySDK.unitypackage"
          asset_content_type: application/octet-stream
